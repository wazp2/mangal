```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangal Hazırlık Listesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .item-row { transition: all 0.2s ease; }
        .item-row:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-orange-600 text-white p-6 shadow-lg rounded-b-[2rem] sticky top-0 z-10">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                <h1 class="text-2xl font-bold tracking-tight text-white">Mangal Hazırlığı</h1>
            </div>
            <div class="flex items-center gap-2">
                <span id="counter" class="bg-orange-500 px-3 py-1 rounded-full text-sm font-bold shadow-inner">0 / 0</span>
            </div>
        </div>
        
        <div class="w-full bg-orange-800/30 h-3 rounded-full overflow-hidden mb-2">
            <div id="progress-bar" class="bg-white h-full transition-all duration-700 ease-out" style="width: 0%"></div>
        </div>
        
        <div class="flex justify-between items-center">
            <button onclick="window.resetList()" class="text-orange-100 text-[11px] uppercase font-bold flex items-center gap-1 hover:text-white transition-colors py-1">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> Listeyi Sıfırla
            </button>
            <p id="progress-text" class="text-orange-50 text-xs font-bold tracking-wide">%0 Tamamlandı</p>
        </div>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <!-- Category Tabs -->
        <div id="tabs" class="flex overflow-x-auto gap-2 pb-4 no-scrollbar mb-4 sticky top-[136px] bg-slate-50 py-2 z-10">
            <!-- Tabs generated by JS -->
        </div>

        <!-- Add Item Form -->
        <form id="add-form" class="flex gap-2 mb-6">
            <input
                type="text"
                id="new-item-input"
                placeholder="Listeye ekle..."
                class="flex-1 p-4 rounded-2xl border-none shadow-md focus:ring-2 focus:ring-orange-500 outline-none text-slate-700 font-medium"
            >
            <button 
                type="submit"
                class="bg-orange-600 text-white px-5 rounded-2xl shadow-lg active:scale-90 transition-all hover:bg-orange-700"
            >
                <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </form>

        <!-- List -->
        <div id="items-list" class="space-y-3">
            <!-- Items generated by JS -->
        </div>
    </main>

    <footer class="text-center p-8 text-slate-400 text-xs flex flex-col items-center gap-2">
        <div class="flex items-center gap-1 opacity-60">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span>Verileriniz bu tarayıcıya yerel olarak kaydedilir.</span>
        </div>
        <p class="italic mt-1">"Mangalın tadı, eksiksiz hazırlıktan gelir."</p>
    </footer>

    <script>
        const initialItems = [
            { id: 1, text: 'Tavuk', category: 'Yiyecek', completed: false },
            { id: 2, text: 'Turşu', category: 'Yiyecek', completed: false },
            { id: 3, text: 'Ekmek', category: 'Yiyecek', completed: false },
            { id: 4, text: 'Baharat', category: 'Yiyecek', completed: false },
            { id: 5, text: 'Su', category: 'İçecek', completed: false },
            { id: 6, text: 'Kola', category: 'İçecek', completed: false },
            { id: 7, text: 'Şiş', category: 'Ekipman', completed: false },
            { id: 8, text: 'Maşa', category: 'Ekipman', completed: false },
            { id: 9, text: 'Bıçak / Kesme Tahtası', category: 'Ekipman', completed: false },
            { id: 10, text: 'Islak Mendil', category: 'Temizlik', completed: false },
            { id: 11, text: 'Piknik Örtüsü', category: 'Malzeme', completed: false },
            { id: 12, text: 'Kağıt Tabak', category: 'Malzeme', completed: false },
            { id: 13, text: 'Bardak', category: 'Malzeme', completed: false },
            { id: 14, text: 'Havlu', category: 'Temizlik', completed: false },
        ];

        const categories = ['Hepsi', 'Yiyecek', 'İçecek', 'Ekipman', 'Temizlik', 'Malzeme'];
        
        // Load data from Local Storage
        let items = JSON.parse(localStorage.getItem('mangal_list_data')) || [...initialItems];
        let activeTab = 'Hepsi';

        const listContainer = document.getElementById('items-list');
        const tabsContainer = document.getElementById('tabs');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const counter = document.getElementById('counter');
        const addForm = document.getElementById('add-form');
        const inputField = document.getElementById('new-item-input');

        function saveToLocal() {
            localStorage.setItem('mangal_list_data', JSON.stringify(items));
            updateProgress();
        }

        function renderTabs() {
            tabsContainer.innerHTML = categories.map(cat => `
                <button onclick="window.setActiveTab('${cat}')" class="px-5 py-2.5 rounded-full whitespace-nowrap text-sm font-bold transition-all ${
                    activeTab === cat ? 'bg-orange-600 text-white shadow-lg scale-105' : 'bg-white text-slate-500 hover:bg-orange-50 shadow-sm'
                }">
                    ${cat}
                </button>
            `).join('');
        }

        function renderItems() {
            const filtered = activeTab === 'Hepsi' ? items : items.filter(i => i.category === activeTab);
            
            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-16 opacity-40">
                        <svg class="w-20 h-20 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/></svg>
                        <p class="text-lg font-medium">Bu liste boş görünüyor...</p>
                    </div>
                `;
            } else {
                listContainer.innerHTML = filtered.map(item => `
                    <div class="item-row flex items-center gap-4 p-4 bg-white rounded-2xl shadow-sm border-l-4 ${item.completed ? 'border-green-500 opacity-75' : 'border-orange-500 shadow-md'}">
                        <button onclick="window.toggleItem(${item.id})" class="flex-shrink-0">
                            ${item.completed 
                                ? '<div class="bg-green-500 rounded-full p-0.5"><svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg></div>' 
                                : '<div class="w-7 h-7 rounded-full border-2 border-slate-200"></div>'
                            }
                        </button>
                        <div class="flex-1 min-w-0" onclick="window.toggleItem(${item.id})">
                            <p class="text-[17px] font-semibold truncate ${item.completed ? 'line-through text-slate-400' : 'text-slate-700'}">
                                ${item.text}
                            </p>
                            <span class="text-[9px] uppercase tracking-widest font-black text-slate-400">${item.category}</span>
                        </div>
                        <button onclick="window.deleteItem(${item.id})" class="p-2 text-slate-200 hover:text-red-500 transition-colors">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                `).join('');
            }
            updateProgress();
        }

        function updateProgress() {
            const completed = items.filter(i => i.completed).length;
            const total = items.length;
            const pct = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            progressBar.style.width = pct + '%';
            progressText.innerText = `%${pct} Tamamlandı`;
            counter.innerText = `${completed} / ${total}`;
        }

        window.toggleItem = (id) => {
            items = items.map(i => i.id === id ? { ...i, completed: !i.completed } : i);
            renderItems();
            saveToLocal();
        };

        window.deleteItem = (id) => {
            items = items.filter(i => i.id !== id);
            renderItems();
            saveToLocal();
        };

        window.setActiveTab = (tab) => {
            activeTab = tab;
            inputField.placeholder = `${tab === 'Hepsi' ? 'Listeye' : tab} ekle...`;
            renderTabs();
            renderItems();
        };

        window.resetList = () => {
            if (confirm("Listenizi varsayılan haline getirmek istiyor musunuz? Eklediğiniz yeni ürünler silinecektir.")) {
                items = [...initialItems];
                renderItems();
                saveToLocal();
            }
        };

        addForm.onsubmit = (e) => {
            e.preventDefault();
            const text = inputField.value.trim();
            if (!text) return;
            const newItem = {
                id: Date.now(),
                text,
                category: activeTab === 'Hepsi' ? 'Malzeme' : activeTab,
                completed: false
            };
            items.unshift(newItem); // Add to beginning
            inputField.value = '';
            renderItems();
            saveToLocal();
        };

        // Initial Start
        renderTabs();
        renderItems();
    </script>
</body>
</html>
